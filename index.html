<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NPTEL Certificate</title>

<style>

body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffffff;
    font-family:sans-serif;
}

.container{
    text-align:center;
    width:90%;
    max-width:430px;
}

/* REAL NPTEL STYLE PDF ICON */

.pdf-icon{
    width:120px;
    height:120px;
    margin:auto;
    position:relative;
}

.pdf-paper{
    width:100%;
    height:100%;
    background:#ececec;
    border-radius:12px;
    position:relative;
    overflow:hidden;
}

.pdf-paper::before{
    content:"";
    position:absolute;
    top:0;
    right:0;
    width:30px;
    height:30px;
    background:#f7f7f7;
    clip-path:polygon(0 0,100% 0,100% 100%);
}

.pdf-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    
    color:#ffffff;
    font-size:44px;
    font-weight:700;
    letter-spacing:2px;
}

/* FILE NAME */

.file-name{
    margin-top:35px;
    font-size:22px;
    color:#111;
    line-height:1.5;
    word-break:break-word;
}

/* OPEN BUTTON */

.open-btn{
    display:inline-block;
    margin-top:38px;
    background:#0a6cff;
    color:white;
    text-decoration:none;

    padding:22px 120px;

    border-radius:24px;

    font-size:34px;
    font-weight:700;

    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.open-btn:active{
    transform:scale(0.98);
}

</style>
</head>

<body>

<div class="container">

    <div class="pdf-icon">
        <div class="pdf-paper"></div>
        <div class="pdf-text">PDF</div>
    </div>

    <div class="file-name">
        NOC26HS54S55390019403264023.pdf
    </div>

    <a class="open-btn"
       href="NOC26HS54S55390019403264023.pdf">
       Open
    </a>

</div>

</body>
</html>
