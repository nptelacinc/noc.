<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF Viewer</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffffff;
    font-family:sans-serif;
}

.container{
    text-align:center;
}

.pdf-box{
    width:170px;
    height:170px;
    background:#e5e5e5;
    border-radius:18px;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:64px;
    font-weight:bold;
    letter-spacing:2px;
}

.file-name{
    margin-top:35px;
    font-size:24px;
    color:#222;
    font-family:sans-serif;
    word-break:break-word;
}

.open-btn{
    display:inline-block;
    margin-top:35px;
    padding:22px 110px;
    background:#0a6cff;
    color:white;
    text-decoration:none;
    font-size:36px;
    font-weight:bold;
    border-radius:22px;
    font-family:sans-serif;
}

</style>
</head>

<body>

<div class="container">

    <div class="pdf-box">
        PDF
    </div>

    <div class="file-name">
        NOC26HS54S55390019403264023.pdf
    </div>

    <a class="open-btn"
    href="NOC26HS54S55390019403264023.pdf">
        Open
    </a>

</div>

</body>
</html>
