<!DOCTYPE html>
<html lang="en">
<head>

    align-items:center;
}

.box{
    text-align:center;
    width:90%;
    max-width:500px;
}

.pdf-icon{

    opacity:0.16;

    font-size:21px;

    margin-bottom:32px;

.open-btn{
    display:inline-block;

    padding:18px 0;

    color:white;
    text-decoration:none;
    border-radius:22px;
    font-size:32px;
    font-weight:bold;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);

.open-btn:active{
    transform:scale(0.98);

</style>
</head>

<body>
