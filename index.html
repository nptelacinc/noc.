<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NPTEL Certificate</title>

<style>

body{
    margin:0;
    padding:0;
    background:#ffffff;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:90%;
    max-width:420px;
    text-align:center;
}

/* Real NPTEL Style PDF Icon */

.pdf-icon{
    width:150px;
    height:180px;
    background:#e7e7e7;
    border-radius:16px;
    margin:auto;
    position:relative;

    box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.8),
    0 3px 8px rgba(0,0,0,0.08);
}

.pdf-icon::before{
    content:"";
    position:absolute;
    top:0;
    right:0;
    width:42px;
    height:42px;
    background:#f4f4f4;

    clip-path:polygon(0 0,100% 0,100% 100%);
    
    border-top-right-radius:16px;
}

.pdf-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    
    font-size:56px;
    font-weight:700;
    color:#ffffff;
    letter-spacing:3px;
}

/* File Name */

.file-name{
    margin-top:38px;
    font-size:24px;
    line-height:1.5;
    color:#222;
    word-break:break-word;
}

/* Open Button */

.open-btn{
    display:inline-block;
    margin-top:38px;
    padding:22px 120px;
    
    background:#0b6ffb;
    color:white;

    text-decoration:none;
    font-size:36px;
    font-weight:700;

    border-radius:24px;

    box-shadow:
    0 5px 12px rgba(0,0,0,0.15);
}

.open-btn:active{
    transform:scale(0.98);
}

</style>
</head>

<body>

<div class="container">

    <!-- PDF ICON -->

    <div class="pdf-icon">
        <div class="pdf-text">PDF</div>
    </div>

    <!-- FILE NAME -->

    <div class="file-name">
        NOC26HS54S55390019403264023.pdf
    </div>

    <!-- OPEN BUTTON -->

    <a class="open-btn"
       href="NOC26HS54S55390019403264023.pdf">
       Open
    </a>

</div>

</body>
</html>
